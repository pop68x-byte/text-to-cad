name: Generate DPMA shaft CAD outputs

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate STEP/STL/ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          # The DPMA shaft generator currently uses only the Python standard library.
          # Keep this step so dependency installation can be extended if the generator changes.

      - name: Generate STEP and STL
        run: python models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.py

      - name: Create ZIP bundle
        run: |
          zip -9 models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.zip \
            models/dpma_715423_014chd_shaft/README.md \
            models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.py \
            models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.step \
            models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.stl

      - name: Upload CAD outputs
        uses: actions/upload-artifact@v4
        with:
          name: dpma-715423-014chd-shaft-cad-outputs
          if-no-files-found: error
          path: |
            models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.step
            models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.stl
            models/dpma_715423_014chd_shaft/dpma_715423_014chd_shaft.zip
